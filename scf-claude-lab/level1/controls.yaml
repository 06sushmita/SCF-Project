- control_id: SCF-014
  title: If The Nominee Is A Minor
  control_domain: Data Governance
  control_family: Investor Rights and Record Management
  objective: Ensure accurate and complete records are maintained for if nominee minor.
  control_statement: If the nominee is a minor, the holder(s) of the Relief/Savings B ond may appoint any person, not being
    a minor, to receive the proceeds of a R elief/Savings B ond on behalf of the nominee in the event of his/her/their death
