controls:
- control_id: SCF-001
  title: Procedure For Enrollment / Registration Of Brokers
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to procedure enrollment / registration.
  control_statement: Procedure for enrollment / registration of brokers Receiving Offices may follow a simple procedure for
    enrolment/registration of brokers.
  control_type: Preventive
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-002
  title: The Broker Seeking Enrolment/Registration May Submit The
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to broker seeking enrolment/registration may.
  control_statement: The broker seeking enrolment/registration may submit the request for registration on their business letterhead
    together with business data to the Receiving Offices .
  control_type: Preventive
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-003
  title: The Receiving Office Should Allot A Code
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to receiving office should allot.
  control_statement: The Receiving Office should allot a code number to the broker which should be quoted by the broker on
    all applications tendered at the Receiving offices for claiming brokerage.
  control_type: Preventive
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-004
  title: That In Cases Where Receiving Offices Engage
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to we advise cases where.
  control_statement: We advise that in cases where Receiving Offices engage the services of other banks/institutions as a
    broker or agent, the Receiving Office which have appointed them are solely responsible for their activities as an agents
    /broker s. RBI's name should not be used by such agents /brokers .
  control_type: Preventive
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-005
  title: No Tds On Payment Of Brokerage No
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to no tds payment brokerage.
  control_statement: No TDS on payment of brokerage No tax is required to be deducted at source by the Receiving Office while
    making payment of brokerage in respect of the Relief/Savings B onds business canvassed by brokers in terms of Section
    194 (H) of the Income Tax Act, 196 1.
  control_type: Preventive
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-006
  title: Receiving Offices Are To Settle The Brokerage
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to receiving offices settle.
  control_statement: Receiving Offices must are to settle the brokerage claims expeditiously, and in any case, not later than
    30 days from the date of subscription.
  control_type: Corrective
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-007
  title: Receiving Offices Are Advised To First Settle
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to receiving offices advised first.
  control_statement: Receiving Offices are advised to first settle the brokerage claims and thereafter seek reimbursement
    from RBI.
  control_type: Corrective
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
