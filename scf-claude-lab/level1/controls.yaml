  title: Nomination Will Also Stand Cancelled If The
  control_domain: Data Governance
  control_family: Investor Rights and Record Management
  objective: Ensure accurate and complete records are maintained for nomination will also stand.
  control_statement: Nomination will also stand cancelled if the Bond holders must(s) transfers the bonds to another party
