- control_id: SCF-016
  title: 8 % Savings Taxable Bonds
  control_domain: Data Governance
  control_family: Investor Rights and Record Management
  objective: Ensure accurate and complete records are maintained for case 8 % savings.
  control_statement: In case of 8 % Savings (Taxable) Bonds, 2003 the sole holder or all the joint holders can also nominate
    a Non-resident Indian (NRI) as his/her/their nominee(s) and remittance of interest payment and/or maturity value, as the
    case may be, will be governed by the regulations framed under FEMA 1999 as applicable to NRIs.
  control_type: Preventive
  risk_addressed: Disputed or fraudulent claims on investor assets due to missing or incorrect records.
  evidence_required: BLA nomination records; Acknowledgement of Nomination copies; transfer and cancellation logs.
  metrics: '% of active BLAs with a registered nomination; number of acknowledgements issued vs. nominations filed.'
  assumptions: Receiving Offices have record-keeping systems capable of storing and retrieving per-BLA nomination data.
- control_id: SCF-017
  title: In Case Detailed Clarifications Are Required On
  control_domain: Governance and Compliance
  control_family: Policy and Regulatory Change Management
  objective: Ensure case detailed clarifications required is governed by current, enforceable, and consistently applied policy.
  control_statement: (In case detailed clarifications are required on specific issues, the circulars indicated above may please
    be referred to).
  control_type: Preventive
  risk_addressed: Operational non-compliance from outdated or inconsistently applied internal policies.
  evidence_required: Version-controlled policy documents; RBI circular update logs; staff distribution acknowledgements.
  metrics: Time elapsed from RBI circular publication to internal policy update; % of offices confirmed as updated.
  assumptions: A designated policy owner monitors RBI publications and is empowered to trigger internal reviews.
