- control_id: SCF-008
  title: Improvement In Customer Service
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to measure towards improvement.
  control_statement: As a measure towards improvement in customer service, Receiving Offices may arrange to pay the brokerage
    to the agents, on a monthly basis by credit to their accounts through ECS after obtaining requisite mandate from them.
  control_type: Preventive
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
- control_id: SCF-009
  title: A Sole Holder Or All The Joint
  control_domain: Data Governance
  control_family: Investor Rights and Record Management
  objective: Ensure accurate and complete records are maintained for sole holder.
  control_statement: A sole holder or all the joint holders ( investors) of a Relief/Savings B ond held in the form of a BLA
    may nominate one or more persons who in the event of death of the sole holder/all the joint holders, as the case may be,
    would be entitled to the Relief/Savings B ond and to the payment thereon, provided that the person or each of the persons
    nominated is himself/herself competent to hold a similar bond.
  control_type: Preventive
  risk_addressed: Disputed or fraudulent claims on investor assets due to missing or incorrect records.
  evidence_required: BLA nomination records; Acknowledgement of Nomination copies; transfer and cancellation logs.
  metrics: '% of active BLAs with a registered nomination; number of acknowledgements issued vs. nominations filed.'
  assumptions: Receiving Offices have record-keeping systems capable of storing and retrieving per-BLA nomination data.
- control_id: SCF-010
  title: The Nomination Should Be Made Before Maturity
  control_domain: Data Governance
  control_family: Investor Rights and Record Management
  objective: Ensure accurate and complete records are maintained for nomination should made before.
  control_statement: The nomination should be made before maturity o f the bond.
  control_type: Preventive
  risk_addressed: Disputed or fraudulent claims on investor assets due to missing or incorrect records.
  evidence_required: BLA nomination records; Acknowledgement of Nomination copies; transfer and cancellation logs.
  metrics: '% of active BLAs with a registered nomination; number of acknowledgements issued vs. nominations filed.'
  assumptions: Receiving Offices have record-keeping systems capable of storing and retrieving per-BLA nomination data.
- control_id: SCF-011
  title: When Nomination Has Been Made In Favour
  control_domain: Data Governance
  control_family: Investor Rights and Record Management
  objective: Ensure accurate and complete records are maintained for when nomination has been.
  control_statement: When nomination has been made in favour of two or more nominees, in the event of the death of either
    or any of them, the surviving nominee or nominees, as the case may be, shall be entitled to the Relief/Savings B ond and
    payment thereon.
  control_type: Preventive
  risk_addressed: Disputed or fraudulent claims on investor assets due to missing or incorrect records.
  evidence_required: BLA nomination records; Acknowledgement of Nomination copies; transfer and cancellation logs.
  metrics: '% of active BLAs with a registered nomination; number of acknowledgements issued vs. nominations filed.'
  assumptions: Receiving Offices have record-keeping systems capable of storing and retrieving per-BLA nomination data.
- control_id: SCF-012
  title: A Nomination Made By The Holder(S Of
  control_domain: Access Control
  control_family: Third-Party and Agent Management
  objective: Ensure only authorised and verified parties are permitted to nomination made holder(s.
  control_statement: A nomination made by the holder(s) of a Relief/Savings B ond may be varied or cancelled by making a fresh
    nomination in the prescribed manner and intimating the same in writing to the branch of the Receiving Office where the
    BLA is maintained and shall be effective from the date of such registration.
  control_type: Corrective
  risk_addressed: Unauthorized or fraudulent access by unverified brokers, agents, or investors.
  evidence_required: Broker/agent registration register; unique code assignment logs; enrollment application copies.
  metrics: '% of applications bearing a valid registered broker code; number of unauthorised access incidents per quarter.'
  assumptions: Receiving Offices maintain a formal broker registry and have authority to assign and deactivate codes.
